name: Update fenix sha256

on:
  pull_request:
    branches:
      - main
    paths:
      - rust-toolchain.toml

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  update-fenix-sha256:
    name: Update fenix sha256
    runs-on: ubuntu-24.04
    if: |
      contains(github.event.pull_request.labels.*.name, 'renovate') &&
      !contains(github.event.pull_request.labels.*.name, 'fenix-sha256-updated')
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ vars.UPDATE_APP_ID }}
          private-key: ${{ secrets.UPDATE_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Get GitHub App User ID
        id: get-user-id
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: echo "user-id=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@a18f73c54ca8525de051e73c31512a67f44df919 # v3.17.1

      - name: Update fenix sha256
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          USER_ID: ${{ steps.get-user-id.outputs.user-id }}
        run: |-
          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "$GITHUB_HEAD_REF"
          git checkout -B "$GITHUB_HEAD_REF" "${{ github.event.pull_request.head.sha }}"

          CHANNEL=$(grep '^channel' rust-toolchain.toml | sed 's/channel = "\(.*\)"/\1/')
          if echo "$CHANNEL" | grep -qE '^nightly-[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
            DATE=$(echo "$CHANNEL" | sed 's/nightly-//')
            URL="https://static.rust-lang.org/dist/${DATE}/channel-rust-nightly.toml"
          else
            URL="https://static.rust-lang.org/dist/channel-rust-${CHANNEL}.toml"
          fi
          HASH=$(nix-prefetch-url "$URL" 2>/dev/null)
          SRI=$(nix hash convert --hash-algo sha256 --to sri "$HASH")
          sed -i 's|sha256 = "[^"]*"; # x-fenix-sha256|sha256 = "'"${SRI}"'"; # x-fenix-sha256|' flake.nix

          if ! git diff --quiet flake.nix; then
            git config user.name "${APP_SLUG}[bot]"
            git config user.email "${USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
            git add flake.nix
            git commit -m "fix(nix): :wrench: update fenix sha256 for ${CHANNEL}"
            git push origin "$GITHUB_HEAD_REF"
          fi

          gh pr edit "${{ github.event.pull_request.number }}" --add-label "fenix-sha256-updated" --repo "$GITHUB_REPOSITORY"
