name: Update swiftpm2nix generated files

on:
  pull_request:
    branches:
      - main
    paths:
      - "**/Package.swift"
      - "**/Package.resolved"

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  update-swiftpm2nix:
    name: Update swiftpm2nix generated files
    runs-on: macos-15
    if: contains(github.event.pull_request.labels.*.name, 'renovate')
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ vars.UPDATE_APP_ID }}
          private-key: ${{ secrets.UPDATE_PRIVATE_KEY }}
          permission-contents: write

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@131015bad844610e5e6300f8a143bf625d3e74f4 # v3.17.0
        with:
          extra-conf: |
            extra-substituters = https://nix-cache.cffnpwr.dev
            extra-trusted-public-keys = cffnpwr-nixpkgs-extras:dmp2DUGwdqawLCPOsOcRxU/NpCO/qA1jha/8rmoSzvA=

      - name: Get GitHub App User ID
        id: get-user-id
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: echo "user-id=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"

      - name: Update swiftpm2nix generated files
        env:
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          USER_ID: ${{ steps.get-user-id.outputs.user-id }}
        run: |-
          git fetch --depth=1 origin "$GITHUB_HEAD_REF"
          git checkout -B "$GITHUB_HEAD_REF" "${{ github.event.pull_request.head.sha }}"

          nix develop --command swiftpm2nix
          mv nix/default.nix nix/darwin-ism/generated/default.nix
          mv nix/workspace-state.json nix/darwin-ism/generated/workspace-state.json

          if ! git diff --quiet nix/darwin-ism/generated/; then
            git config user.name "${APP_SLUG}[bot]"
            git config user.email "${USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
            git add nix/darwin-ism/generated/
            git commit -m "fix(nix): :package: update swiftpm2nix generated files"
            git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin "$GITHUB_HEAD_REF"
            git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"
          fi
