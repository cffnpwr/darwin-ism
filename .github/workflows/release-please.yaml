name: Release Please

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions: {}
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - name: Create GitHub App Token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PRIVATE_KEY }}
          permission-metadata: read
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write

      - name: Release Please
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          target-branch: ${{ github.ref_name }}
          config-file: .github/release-please/config.json
          manifest-file: .github/release-please/manifest.json

  build:
    name: Build (${{ matrix.system }})
    # DeterminateNix does not support x86_64-darwin natively.
    # Use aarch64-darwin runner with Rosetta 2 to build for x86_64-darwin.
    runs-on: macos-15
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        system:
          - aarch64-darwin
          - x86_64-darwin
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.sha }}
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@32cb6a5ae30bb0dfc996fa7baf8bf1ed28442fa4 # v3.17.3

      - name: Build
        run: |
          nix build --system ${{ matrix.system }}
          mkdir -p dist
          cp result/bin/darwin-ism dist/darwin-ism-${{ matrix.system }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-${{ matrix.system }}
          path: dist/

  create-universal:
    name: Create Universal Binary
    runs-on: macos-15
    needs: [release-please, build]
    if: needs.release-please.outputs.release_created == 'true'
    timeout-minutes: 10
    permissions: {}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: dist-*

      - name: Create universal binary
        run: |
          mkdir -p dist
          lipo -create \
            dist-aarch64-darwin/darwin-ism-aarch64-darwin \
            dist-x86_64-darwin/darwin-ism-x86_64-darwin \
            -output dist/darwin-ism-universal

      - name: Upload universal artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-universal
          path: dist/

  release:
    name: Upload Release Assets
    runs-on: ubuntu-24.04
    needs: [release-please, build, create-universal]
    if: needs.release-please.outputs.release_created == 'true'
    timeout-minutes: 10
    permissions: {}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: dist-*

      - name: Create GitHub App Token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PRIVATE_KEY }}
          permission-metadata: read
          permission-contents: write

      - name: Create archives, checksums and upload
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |-
          VERSION="${TAG_NAME#v}"

          for artifact_dir in dist-*/; do
            system="${artifact_dir#dist-}"
            system="${system%/}"
            binary="${artifact_dir}darwin-ism-${system}"

            if [ ! -f "$binary" ]; then
              echo "Warning: binary not found in ${artifact_dir}"
              continue
            fi

            archive_name="darwin-ism_${VERSION}_${system}.tar.gz"

            tmpdir=$(mktemp -d)
            cp "$binary" "$tmpdir/darwin-ism"
            tar -czf "$archive_name" -C "$tmpdir" .
            rm -rf "$tmpdir"
          done

          sha256sum ./*.tar.gz > checksums.txt

          gh release upload "$TAG_NAME" ./*.tar.gz checksums.txt
          gh release edit "$TAG_NAME" --draft=false
