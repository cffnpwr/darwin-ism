[global]
excludes = [".git/**", "result/**", ".serena/**", "target/**"]

[formatter.nix]
command = "nixfmt"
includes = ["*.nix"]

[formatter.rust]
command = "rustfmt"
options = ["--config-path", "./rustfmt.toml"]
includes = ["*.rs"]

[formatter.yaml]
command = "yamlfmt"
includes = ["*.yaml", "*.yml"]
